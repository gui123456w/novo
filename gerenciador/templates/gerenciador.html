<h1>Feed de Tarefas</h1>

{% for tarefa in tarefas %}

    <h3>{{ tarefa.titulo }}</h3>

    <p>{{ tarefa.descricao }}</p>

    <p>Usuário: {{ tarefa.usuario.username }}</p>

    {% if tarefa.arquivo %}
         <a href="{{ url_for('tarefas', id_usuario=tarefa.usuario.id) }}">
        <img src="{{ url_for('static', filename='arquivo_tarefa/' + tarefa.arquivo) }}" width="150">
        </a>
    {% endif %}

    <hr>

{% endfor %}
